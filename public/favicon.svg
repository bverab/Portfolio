<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="1"/>
      <stop offset="100%" stop-color="#0891b2" stop-opacity="1"/>
    </radialGradient>
  </defs>

  <!-- Nodos exteriores (4 puntos de la red neuronal) -->
  <circle cx="50" cy="12" r="6" fill="#22d3ee" opacity="0.9"/>
  <circle cx="88" cy="50" r="6" fill="#22d3ee" opacity="0.9"/>
  <circle cx="50" cy="88" r="6" fill="#22d3ee" opacity="0.9"/>
  <circle cx="12" cy="50" r="6" fill="#22d3ee" opacity="0.9"/>

  <!-- Nodos diagonales (más pequeños) -->
  <circle cx="76" cy="24" r="4" fill="#67e8f9" opacity="0.7"/>
  <circle cx="76" cy="76" r="4" fill="#67e8f9" opacity="0.7"/>
  <circle cx="24" cy="76" r="4" fill="#67e8f9" opacity="0.7"/>
  <circle cx="24" cy="24" r="4" fill="#67e8f9" opacity="0.7"/>

  <!-- Conexiones de red (líneas delgadas) -->
  <line x1="50" y1="12" x2="76" y2="24" stroke="#22d3ee" stroke-width="1.5" opacity="0.4"/>
  <line x1="76" y1="24" x2="88" y2="50" stroke="#22d3ee" stroke-width="1.5" opacity="0.4"/>
  <line x1="88" y1="50" x2="76" y2="76" stroke="#22d3ee" stroke-width="1.5" opacity="0.4"/>
  <line x1="76" y1="76" x2="50" y2="88" stroke="#22d3ee" stroke-width="1.5" opacity="0.4"/>
  <line x1="50" y1="88" x2="24" y2="76" stroke="#22d3ee" stroke-width="1.5" opacity="0.4"/>
  <line x1="24" y1="76" x2="12" y2="50" stroke="#22d3ee" stroke-width="1.5" opacity="0.4"/>
  <line x1="12" y1="50" x2="24" y2="24" stroke="#22d3ee" stroke-width="1.5" opacity="0.4"/>
  <line x1="24" y1="24" x2="50" y2="12" stroke="#22d3ee" stroke-width="1.5" opacity="0.4"/>

  <!-- Conexiones al centro -->
  <line x1="50" y1="12" x2="50" y2="50" stroke="#22d3ee" stroke-width="1.5" opacity="0.3"/>
  <line x1="88" y1="50" x2="50" y2="50" stroke="#22d3ee" stroke-width="1.5" opacity="0.3"/>
  <line x1="50" y1="88" x2="50" y2="50" stroke="#22d3ee" stroke-width="1.5" opacity="0.3"/>
  <line x1="12" y1="50" x2="50" y2="50" stroke="#22d3ee" stroke-width="1.5" opacity="0.3"/>
  <line x1="76" y1="24" x2="50" y2="50" stroke="#22d3ee" stroke-width="1" opacity="0.25"/>
  <line x1="76" y1="76" x2="50" y2="50" stroke="#22d3ee" stroke-width="1" opacity="0.25"/>
  <line x1="24" y1="76" x2="50" y2="50" stroke="#22d3ee" stroke-width="1" opacity="0.25"/>
  <line x1="24" y1="24" x2="50" y2="50" stroke="#22d3ee" stroke-width="1" opacity="0.25"/>

  <!-- Nodo central — estrella/neurona principal -->
  <circle cx="50" cy="50" r="11" fill="url(#glow)" opacity="1"/>
  <circle cx="50" cy="50" r="7" fill="#e0f7ff" opacity="0.95"/>
</svg>
